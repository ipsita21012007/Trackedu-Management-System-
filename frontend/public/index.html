<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Main Card */
        .main-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 30px;
        }

        /* Form Section */
        .form-section {
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .form-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .form-group input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .btn-warning:hover {
            background: #e68900;
        }

        /* Table Section */
        .table-section {
            padding: 30px;
        }

        .table-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .user-table {
            width: 100%;
            border-collapse: collapse;
        }

        .user-table th,
        .user-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .user-table th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        .user-table tr:hover {
            background: #f5f5f5;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .edit-btn, .delete-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .edit-btn {
            background: #2196F3;
            color: white;
        }

        .delete-btn {
            background: #f44336;
            color: white;
        }

        .edit-btn:hover, .delete-btn:hover {
            transform: scale(1.05);
        }

        /* Status Messages */
        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.5s ease;
        }

        .status-success {
            background: #4caf50;
        }

        .status-error {
            background: #f44336;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .user-table {
                font-size: 12px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>User Management System</h1>
            <p>Complete CRUD Operations with MySQL Database</p>
        </div>

        <div class="main-card">
            <!-- Form Section - Step 1: User enters data -->
            <div class="form-section">
                <h2 class="form-title">User Registration Form</h2>
                <form id="userForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="name">Full Name *</label>
                            <input type="text" id="name" name="name" required placeholder="Enter full name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="email" id="email" name="email" required placeholder="Enter email address">
                        </div>
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" name="age" placeholder="Enter age">
                        </div>
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" name="city" placeholder="Enter city">
                        </div>
                    </div>
                    <div>
                        <button type="submit" class="btn btn-primary" id="submitBtn">➕ Add User</button>
                        <button type="button" class="btn btn-warning" id="updateBtn" style="display:none;">✏️ Update User</button>
                        <button type="button" class="btn" id="cancelBtn" style="display:none;">❌ Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Table Section - Step 15: Display results -->
            <div class="table-section">
                <h2 class="table-title">📋 Registered Users</h2>
                <div id="usersList">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading users...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEditId = null;

        // Step 2 & 14: Data sent to server and results returned
        const API_URL = 'https://trackedu-edu.onrender.com/api';

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.createElement('div');
            statusDiv.className = `status status-${type}`;
            statusDiv.textContent = message;
            document.body.appendChild(statusDiv);
            
            setTimeout(() => {
                statusDiv.remove();
            }, 3000);
        }

        // Fetch and display users (Steps 2-15 flow)
        async function fetchUsers() {
            try {
                // Step 2: Data request sent to server
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if (result.success) {
                    // Step 14-15: Results returned and displayed
                    displayUsers(result.data);
                } else {
                    showStatus('Failed to load users', 'error');
                }
            } catch (error) {
                showStatus('Error connecting to server', 'error');
                console.error('Error:', error);
            }
        }

        // Display users in table (Step 15)
        function displayUsers(users) {
            const usersListDiv = document.getElementById('usersList');
            
            if (users.length === 0) {
                usersListDiv.innerHTML = '<div class="loading">No users found. Add your first user!</div>';
                return;
            }
            
            const table = `
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Age</th>
                            <th>City</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>${user.id}</td>
                                <td>${escapeHtml(user.name)}</td>
                                <td>${escapeHtml(user.email)}</td>
                                <td>${user.age || '-'}</td>
                                <td>${escapeHtml(user.city) || '-'}</td>
                                <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="edit-btn" onclick="editUser(${user.id})">Edit</button>
                                        <button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            
            usersListDiv.innerHTML = table;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Handle form submission - Add User (Step 1-15 complete flow)
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Step 1: User enters data in form
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: document.getElementById('age').value,
                city: document.getElementById('city').value
            };
            
            try {
                // Step 2: Data sent to server (via POST request)
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('✅ User added successfully!', 'success');
                    // Step 15: Refresh display
                    fetchUsers();
                    document.getElementById('userForm').reset();
                } else {
                    showStatus('❌ Error: ' + result.error, 'error');
                }
            } catch (error) {
                showStatus('❌ Error adding user', 'error');
            }
        });
        
        // Edit user function
        window.editUser = async (id) => {
            try {
                const response = await fetch(`${API_URL}/${id}`);
                const result = await response.json();
                
                if (result.success) {
                    const user = result.data;
                    currentEditId = id;
                    
                    // Fill form with user data
                    document.getElementById('name').value = user.name;
                    document.getElementById('email').value = user.email;
                    document.getElementById('age').value = user.age;
                    document.getElementById('city').value = user.city;
                    
                    // Change button visibility
                    document.getElementById('submitBtn').style.display = 'none';
                    document.getElementById('updateBtn').style.display = 'inline-block';
                    document.getElementById('cancelBtn').style.display = 'inline-block';
                    
                    // Scroll to form
                    document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                showStatus('Error loading user data', 'error');
            }
        };
        
        // Update user
        document.getElementById('updateBtn').addEventListener('click', async () => {
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: document.getElementById('age').value,
                city: document.getElementById('city').value
            };
            
            try {
                const response = await fetch(`${API_URL}/${currentEditId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showStatus('✅ User updated successfully!', 'success');
                    fetchUsers();
                    resetForm();
                } else {
                    showStatus('❌ Error updating user', 'error');
                }
            } catch (error) {
                showStatus('❌ Error updating user', 'error');
            }
        });
        
        // Delete user
        window.deleteUser = async (id) => {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showStatus('✅ User deleted successfully!', 'success');
                        fetchUsers();
                    } else {
                        showStatus('❌ Error deleting user', 'error');
                    }
                } catch (error) {
                    showStatus('❌ Error deleting user', 'error');
                }
            }
        };
        
        // Cancel edit
        document.getElementById('cancelBtn').addEventListener('click', resetForm);
        
        function resetForm() {
            document.getElementById('userForm').reset();
            currentEditId = null;
            document.getElementById('submitBtn').style.display = 'inline-block';
            document.getElementById('updateBtn').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'none';
        }
        
        // Initial load
        fetchUsers();
    </script>
</body>
</html>
